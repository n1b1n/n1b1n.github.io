<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amal Suresh | Concept Artist</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 320px;
            /* Rich Professional Palette */
            --bg-deep: #020406; /* Midnight Obsidian */
            --bg-gradient: radial-gradient(circle at 20% 30%, #0a1118 0%, #020406 100%);
            --accent-blue: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #6b7c89;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-deep);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR WITH GLASSMORPHISM */
        aside {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 80px 50px;
            background: rgba(2, 4, 6, 0.7);
            backdrop-filter: blur(20px); /* Frosted glass effect */
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
        }

        .logo-name { 
            font-size: 14px; 
            letter-spacing: 6px; 
            text-transform: uppercase; 
            color: var(--accent-blue);
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .portfolio-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 38px;
            line-height: 1;
            margin-bottom: 60px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav ul { list-style: none; }
        nav ul li { margin-bottom: 24px; }
        nav ul li a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            display: block;
        }

        nav ul li a:hover { 
            color: var(--accent-blue); 
            transform: translateX(8px);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .contact-info {
            margin-top: auto;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 2;
        }
        
        .contact-info strong { color: #fff; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* MAIN CONTENT - MASONRY STYLE */
        main {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            padding: 15px;
        }

        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 15px;
        }

        .art-card {
            position: relative;
            height: 85vh;
            overflow: hidden;
            background: #000;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .art-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.9) contrast(1.1);
            transition: transform 1.2s cubic-bezier(0.15, 0.83, 0.66, 1);
        }

        .art-card:hover img {
            transform: scale(1.08);
            filter: brightness(1.1) contrast(1);
        }

        /* CARD OVERLAY */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(2, 4, 6, 0.9));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 50px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .art-card:hover .overlay { opacity: 1; }

        .art-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-style: italic;
            margin-bottom: 20px;
        }

        .view-btn {
            width: fit-content;
            padding: 12px 30px;
            background: var(--accent-blue);
            color: #000;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            body { flex-direction: column; }
            aside { 
                position: relative; 
                width: 100%; 
                height: auto; 
                padding: 60px 30px; 
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }
            main { margin-left: 0; width: 100%; }
            .art-card { height: 70vh; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo-box">
            <p class="logo-name">Amal Suresh</p>
        </div>

        <h1 class="portfolio-title">Visual Project<br>Archives</h1>

        <nav>
            <ul>
                <li><a href="#">Work</a></li>
                <li><a href="https://www.artstation.com/" target="_blank">Artstation</a></li>
                <li><a href="https://www.instagram.com/" target="_blank">Instagram</a></li>
                <li><a href="#">About & Contact</a></li>
            </ul>
        </nav>

        <div class="contact-info">
            <strong>Inquiries</strong>
            <p>amal_suresh@conceptart.com</p>
            <p>Kerala, India</p>
        </div>
    </aside>

    <main>
        <div class="art-grid">
            <div class="art-card">
                <img src="art1.jpg" alt="Art 1">
                <div class="overlay">
                    <h3 class="art-title">The Waterfall Sanctuary</h3>
                    <div class="view-btn">Expand Project</div>
                </div>
            </div>

            <div class="art-card">
                <img src="art2.jpg" alt="Art 2">
                <div class="overlay">
                    <h3 class="art-title">Nebula Tree Study</h3>
                    <div class="view-btn">Expand Project</div>
                </div>
            </div>

            <div class="art-card">
                <img src="art3.jpg" alt="Art 3">
                <div class="overlay">
                    <h3 class="art-title">Neo-City Dusk</h3>
                    <div class="view-btn">Expand Project</div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
