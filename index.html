<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amal Suresh | Concept Artist</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 300px;
            --bg-black: #000000;
            --accent-blue: #00d4ff;
            --text-gray: #999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex; /* Sidebar and Content side-by-side */
            min-height: 100vh;
        }

        /* SIDEBAR NAVIGATION */
        aside {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 60px 40px;
            background: #000;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #111;
            z-index: 100;
        }

        .logo-box { margin-bottom: 50px; }
        .logo-name { 
            font-size: 18px; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            color: var(--accent-blue);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .portfolio-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 32px;
            color: #fff;
            margin-bottom: 40px;
        }

        nav ul { list-style: none; }
        nav ul li { margin-bottom: 15px; }
        nav ul li a {
            text-decoration: none;
            color: var(--text-gray);
            font-size: 16px;
            transition: 0.3s;
        }
        nav ul li a:hover { color: #fff; padding-left: 5px; }

        .contact-info {
            margin-top: auto;
            font-size: 13px;
            color: var(--text-gray);
        }
        .contact-info a { color: var(--text-gray); text-decoration: none; }

        /* MAIN CONTENT AREA */
        main {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            padding: 5px; /* Minimal gap for the art */
        }

        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 5px; /* Tight gap like the example */
        }

        .art-card {
            position: relative;
            height: 90vh; /* Very tall images like the screenshot */
            overflow: hidden;
            background: #111;
        }

        .art-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .art-card:hover img {
            transform: scale(1.05);
        }

        /* GLOWING OVERLAY */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.8));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
            opacity: 0;
            transition: 0.4s;
        }

        .art-card:hover .overlay { opacity: 1; }

        .art-title {
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 1px;
            color: #fff;
        }

        .view-btn {
            margin-top: 15px;
            width: fit-content;
            padding: 10px 25px;
            background: #fff;
            color: #000;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 2px;
        }

        /* MOBILE VIEW */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            aside { 
                position: relative; 
                width: 100%; 
                height: auto; 
                padding: 40px 20px; 
                border-right: none;
                border-bottom: 1px solid #111;
            }
            main { margin-left: 0; width: 100%; }
            .art-card { height: 60vh; }
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo-box">
            <div class="logo-name">Amal Suresh</div>
        </div>

        <h2 class="portfolio-title">Portfolio</h2>

        <nav>
            <ul>
                <li><a href="#">Work</a></li>
                <li><a href="#">Artstation</a></li>
                <li><a href="#">Instagram</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>

        <div class="contact-info">
            <p>Email:</p>
            <p><a href="mailto:amal@example.com">amal_suresh@yahoo.com</a></p>
        </div>
    </aside>

    <main>
        <div class="art-grid">
            <div class="art-card">
                <img src="art1.jpg" alt="Art 1">
                <div class="overlay">
                    <p class="art-title">Environment Project</p>
                    <div class="view-btn">View</div>
                </div>
            </div>

            <div class="art-card">
                <img src="art2.jpg" alt="Art 2">
                <div class="overlay">
                    <p class="art-title">Galaxy Illustration</p>
                    <div class="view-btn">View</div>
                </div>
            </div>

            <div class="art-card">
                <img src="art3.jpg" alt="Art 3">
                <div class="overlay">
                    <p class="art-title">City Concept</p>
                    <div class="view-btn">View</div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
