<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amal Suresh | Concept Artist</title>
    <style>
        /* 1. RESET EVERYTHING */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 2. BASE COLORS & BACKGROUND */
        body {
            background-color: #020406 !important; /* Deep Midnight */
            background-image: radial-gradient(circle at 20% 50%, #0a141d 0%, #020406 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; /* This creates the side-by-side look */
            min-height: 100vh;
        }

        /* 3. SIDEBAR (STAYS ON LEFT) */
        aside {
            width: 300px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 60px 40px;
            background: rgba(0, 0, 0, 0.9);
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .name { color: #00d4ff; font-weight: bold; letter-spacing: 3px; margin-bottom: 5px; }
        .title { font-size: 32px; margin-bottom: 40px; font-weight: 300; font-style: italic; }

        nav ul { list-style: none; }
        nav ul li { margin-bottom: 20px; }
        nav ul li a { color: #888; text-decoration: none; transition: 0.3s; }
        nav ul li a:hover { color: #00d4ff; padding-left: 10px; }

        /* 4. MAIN CONTENT (ART ON RIGHT) */
        main {
            margin-left: 300px; /* Must match sidebar width */
            width: calc(100% - 300px);
            padding: 10px;
        }

        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 10px;
        }

        .art-card {
            position: relative;
            height: 85vh; /* Very tall like your example */
            background: #111;
            overflow: hidden;
            border: 1px solid #222;
        }

        .art-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: 1s;
        }

        .art-card:hover img {
            transform: scale(1.05);
        }

        /* 5. OVERLAY TEXT */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        .view-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: #00d4ff;
            color: #000;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* MOBILE FIX */
        @media (max-width: 800px) {
            body { flex-direction: column; }
            aside { position: relative; width: 100%; height: auto; }
            main { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <aside>
        <p class="name">AMAL SURESH</p>
        <h1 class="title">Portfolio</h1>
        <nav>
            <ul>
                <li><a href="#">Work</a></li>
                <li><a href="#">Artstation</a></li>
                <li><a href="#">Instagram</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <div class="art-grid">
            <div class="art-card">
                <img src="art1.jpg" alt="Work 1">
                <div class="overlay">
                    <h3>Project One</h3>
                    <div class="view-btn">View</div>
                </div>
            </div>
            <div class="art-card">
                <img src="art2.jpg" alt="Work 2">
                <div class="overlay">
                    <h3>Project Two</h3>
                    <div class="view-btn">View</div>
                </div>
            </div>
            <div class="art-card">
                <img src="art3.jpg" alt="Work 3">
                <div class="overlay">
                    <h3>Project Three</h3>
                    <div class="view-btn">View</div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
